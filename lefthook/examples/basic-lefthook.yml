output:
  - summary
  - success
  - failure
  - execution
  - skips

pre-commit:
  parallel: true
  jobs:
    - name: prettier
      run: pnpm prettier --write {staged_files}
      glob:
        - "*.{js,ts,tsx,json,md,yml,yaml}"
      stage_fixed: true
    - name: eslint
      run: pnpm eslint --fix {staged_files}
      glob: "*.{js,ts,tsx}"
      stage_fixed: true
    - name: tests
      run: pnpm vitest related --run {staged_files}
      glob: "*.{js,ts,tsx}"

pre-push:
  jobs:
    - name: typecheck
      run: pnpm tsc --noEmit
    - name: unit tests
      run: pnpm vitest run
